<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osmium v2</title>
    <script type="module" src="js/index.js"></script>
    <style>
        :root {
            --bg: #101114;
            --surface: #171a1f;
            --surface-2: #1f2530;
            --line: #2a3342;
            --accent: #00d3ff;
            --accent-2: #ff4b1f;
            --text: #eef2f7;
            --muted: #93a0b3;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            width: 500px;
            height: 400px;
            overflow: hidden;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background: #060607;
            user-select: none;
        }

        .app {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: 52px 1fr 64px;
            background: linear-gradient(165deg, #070708 0%, #0a0a0b 52%, #101113 100%);
        }

        header {
            display: grid;
            grid-template-columns: 1fr auto auto auto auto;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: transparent;
        }

        .title {
            font-size: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        select,
        button {
            border: 1px solid var(--line);
            background: #111722;
            color: var(--text);
            font-size: 11px;
            letter-spacing: 0.7px;
            text-transform: uppercase;
            border-radius: 6px;
            height: 28px;
            padding: 0 10px;
            outline: none;
        }

        select { min-width: 84px; }

        button { cursor: pointer; }

        button:hover,
        select:focus {
            border-color: var(--accent);
        }

        .bypass-btn.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        main {
            padding: 10px 12px;
            display: grid;
            place-items: center;
        }

        .screen {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            background: transparent;
            box-shadow: none;
            display: grid;
            grid-template-rows: 1fr auto;
            align-items: center;
            justify-items: center;
            position: relative;
            overflow: hidden;
            transition: filter 0.18s ease, box-shadow 0.18s ease;
        }

        .screen-glow {
            position: absolute;
            inset: -16px;
            border-radius: 16px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }

        .knob-wrap {
            position: relative;
            width: 184px;
            height: 184px;
            display: grid;
            place-items: center;
            margin-top: 14px;
            margin-bottom: 16px;
        }

        .knob-ring {
            position: absolute;
            inset: 11px;
            border-radius: 50%;
            background: conic-gradient(var(--accent) 0deg, transparent 0deg);
            filter: blur(2.4px);
            opacity: 0.58;
        }

        .knob-track {
            width: 166px;
            height: 166px;
            border-radius: 50%;
            background: #090c11;
            border: 1px solid #20262f;
            display: grid;
            place-items: center;
            box-shadow: inset 0 0 16px rgba(0, 0, 0, 0.56), inset 0 -10px 18px rgba(0, 0, 0, 0.35);
        }

        .knob-body {
            width: 142px;
            height: 142px;
            border-radius: 50%;
            border: 1px solid #2b3542;
            background: linear-gradient(150deg, #161c27 0%, #0b1017 72%);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.52), inset 0 1px 0 rgba(255, 255, 255, 0.06), inset 0 -14px 20px rgba(0, 0, 0, 0.38);
            cursor: ns-resize;
            position: relative;
            transition: box-shadow 0.12s ease;
        }

        .knob-indicator {
            position: absolute;
            top: 8%;
            left: 50%;
            width: 2px;
            height: 16px;
            transform: translateX(-50%);
            transform-origin: center 63px;
            background: #b6c9df;
            box-shadow: 0 0 8px rgba(182, 201, 223, 0.6);
        }

        .knob-value {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-family: Consolas, monospace;
            font-size: 24px;
            color: #dce7f5;
            text-shadow: 0 0 9px rgba(0, 211, 255, 0.2);
            pointer-events: none;
        }

        .mode-hover-name {
            position: absolute;
            top: 14px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 11px;
            letter-spacing: 1.3px;
            text-transform: uppercase;
            color: #ffc2b2;
            opacity: 0;
            transition: opacity 0.12s ease;
            pointer-events: none;
        }

        .mode-hover-name.visible {
            opacity: 1;
        }

        .mode-led-row {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 0 26px 18px;
            align-items: center;
        }

        .mode-led {
            height: 22px;
            border-radius: 999px;
            border: 1px solid #314154;
            background: #111722;
            color: #8ea0b5;
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: grid;
            place-items: center;
            cursor: pointer;
            transition: none;
        }

        .mode-led[data-mode="0"].active {
            color: #cbffe0;
            border-color: #35d47a;
            background: #10261a;
            box-shadow: 0 0 13px rgba(53, 212, 122, 0.5);
        }

        .mode-led[data-mode="1"].active {
            color: #d8d7ff;
            border-color: #7e7dff;
            background: #161a34;
            box-shadow: 0 0 13px rgba(126, 125, 255, 0.52);
        }

        .mode-led[data-mode="2"].active {
            color: #ffd0ca;
            border-color: #ff5a49;
            background: #2a1414;
            box-shadow: 0 0 13px rgba(255, 90, 73, 0.55);
        }

        .mode-led[data-mode="0"].preview {
            border-color: #68e89f;
            color: #d9ffe8;
            box-shadow: 0 0 14px rgba(104, 232, 159, 0.5);
        }

        .mode-led[data-mode="1"].preview {
            border-color: #a9a7ff;
            color: #e1e0ff;
            box-shadow: 0 0 14px rgba(169, 167, 255, 0.5);
        }

        .mode-led[data-mode="2"].preview {
            border-color: #ff8d83;
            color: #ffe1de;
            box-shadow: 0 0 14px rgba(255, 141, 131, 0.5);
        }

        .mode-hover-name.mode-0 { color: #bdf8d6; }
        .mode-hover-name.mode-1 { color: #d5d4ff; }
        .mode-hover-name.mode-2 { color: #ffd1cc; }

        footer {
            display: grid;
            align-items: center;
            padding: 10px 14px;
            background: transparent;
        }

        .out-row {
            display: grid;
            grid-template-columns: 40px 1fr 64px;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.8px;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 99px;
            background: #293344;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 1px solid #b7c9dc;
            background: #dbe7f5;
            cursor: pointer;
        }

        #output-value-display {
            text-align: right;
            font-family: Consolas, monospace;
            color: #dce7f5;
        }
    </style>
</head>
<body>
    <div class="app" id="app-root">
        <header>
            <div class="title">Osmium</div>
            <select id="oversampling_mode">
                <option value="0">Off</option>
                <option value="1">4x</option>
                <option value="2">8x</option>
            </select>
            <select id="tight_lookahead_mode" title="Tight Lookahead">
                <option value="0">LA Off</option>
                <option value="1">LA 0.5</option>
                <option value="2">LA 1.0</option>
                <option value="3">LA 2.0</option>
            </select>
            <button id="clean_low_end">Clean Low</button>
            <button id="bypass" class="bypass-btn active">Active</button>
        </header>

        <main>
            <section class="screen" id="screen-panel">
                <div class="screen-glow" id="screen-glow"></div>
                <div class="mode-hover-name" id="mode-hover-name"></div>
                <div class="knob-wrap">
                    <div class="knob-ring" id="knob-ring"></div>
                    <div class="knob-track">
                        <div class="knob-body" id="intensity-knob">
                            <div class="knob-indicator" id="knob-indicator"></div>
                            <div class="knob-value" id="intensity-value">15%</div>
                        </div>
                    </div>
                </div>
                <div class="mode-led-row" id="mode-led-row">
                    <div class="mode-led active" data-mode="0">Osmium</div>
                    <div class="mode-led" data-mode="1">Tight</div>
                    <div class="mode-led" data-mode="2">Chaotic</div>
                </div>
            </section>
        </main>

        <footer>
            <div class="out-row">
                <div>Out</div>
                <input type="range" id="output_gain" min="-30" max="0" step="0.1" value="0">
                <div id="output-value-display">0.0dB</div>
            </div>
        </footer>
    </div>
</body>
</html>
