<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experimental_Osm</title>
    <script type="module" src="js/index.js"></script>
    <style>
        :root {
            --bg: #101114;
            --surface: #171a1f;
            --surface-2: #1f2530;
            --line: #2a3342;
            --accent: #00d3ff;
            --accent-2: #ff4b1f;
            --text: #eef2f7;
            --muted: #93a0b3;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            width: 980px;
            height: 620px;
            overflow: hidden;
            font-family: "Segoe UI", Tahoma, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 0%, #1c2330 0%, var(--bg) 45%);
            user-select: none;
        }

        .app {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: 56px 1fr 72px;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            border-bottom: 1px solid var(--line);
            background: rgba(10, 14, 20, 0.75);
            backdrop-filter: blur(6px);
        }

        .title {
            font-size: 17px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        button {
            border: 1px solid var(--line);
            background: var(--surface);
            color: var(--text);
            font-size: 11px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border-radius: 6px;
            padding: 7px 10px;
            cursor: pointer;
        }

        button:hover {
            border-color: var(--accent);
        }

        button[disabled] {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .bypass-btn.active {
            color: var(--accent);
            border-color: var(--accent);
        }

        .band-mute-btn.active {
            color: #ffd38e;
            border-color: #c98d38;
            background: rgba(201, 141, 56, 0.2);
        }

        main {
            position: relative;
            overflow: hidden;
            display: grid;
            place-items: center;
            padding: 12px;
        }

        .core-wrap {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
        }

        .knob-track {
            width: 290px;
            height: 290px;
            border-radius: 50%;
            background: #0b0f14;
            box-shadow: inset 0 0 28px #000;
            position: relative;
            display: grid;
            place-items: center;
        }

        .glow-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(var(--accent) 0deg, transparent 0deg);
            filter: blur(6px);
            opacity: 0.86;
            z-index: 1;
        }

        .knob-body {
            width: 228px;
            height: 228px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1b212c, #11151d);
            box-shadow: 6px 6px 14px #090b10, -6px -6px 14px #232b39;
            cursor: ns-resize;
            position: relative;
            z-index: 2;
        }

        .knob-body.locked {
            cursor: not-allowed;
            filter: grayscale(0.4);
            opacity: 0.75;
        }

        .knob-indicator {
            position: absolute;
            top: 10%;
            left: 50%;
            width: 2px;
            height: 16px;
            background: var(--muted);
            transform-origin: center 99px;
            transform: translateX(-50%);
        }

        .knob-value {
            position: absolute;
            inset: 0;
            display: grid;
            place-items: center;
            font-family: Consolas, monospace;
            font-size: 31px;
            color: var(--muted);
            pointer-events: none;
        }

        .knob-lock {
            position: absolute;
            bottom: 22%;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ffd38e;
            border: 1px solid #c98d38;
            border-radius: 999px;
            padding: 3px 8px;
            pointer-events: none;
        }

        footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 14px 16px;
            border-top: 1px solid var(--line);
            background: rgba(10, 14, 20, 0.78);
            backdrop-filter: blur(6px);
        }

        .out-row {
            width: 520px;
            display: grid;
            grid-template-columns: 60px 1fr 82px;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.8px;
        }

        input[type="range"] {
            width: 100%;
            margin: 0;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            border-radius: 99px;
            background: #293344;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: 1px solid #a9c0d8;
            background: #d5e4f5;
            cursor: pointer;
        }

        .exp-menu {
            position: absolute;
            top: 0;
            right: -520px;
            width: 520px;
            height: 100%;
            background: linear-gradient(180deg, #121821 0%, #0e131b 100%);
            border-left: 1px solid var(--line);
            transition: right 0.22s ease;
            z-index: 5;
            display: flex;
            flex-direction: column;
        }

        .exp-menu.visible {
            right: 0;
        }

        .exp-header {
            padding: 12px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .exp-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        .mode-tag {
            font-size: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            border: 1px solid var(--line);
            border-radius: 999px;
            padding: 4px 9px;
        }

        .mode-tag.manual {
            color: #ffd38e;
            border-color: #c98d38;
        }

        .exp-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: grid;
            gap: 10px;
            align-content: start;
        }

        .group {
            border: 1px solid var(--line);
            background: var(--surface);
            border-radius: 9px;
            padding: 10px;
        }

        .group-title {
            margin: 0 0 8px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #d4deea;
        }

        .param {
            display: grid;
            grid-template-columns: 170px 1fr 66px;
            align-items: center;
            gap: 8px;
            margin: 7px 0;
            color: var(--muted);
            font-size: 11px;
        }

        .param-value {
            font-family: Consolas, monospace;
            text-align: right;
            color: #dce7f5;
            font-size: 11px;
        }

        .debug-toggle {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 15;
            font-size: 10px;
        }

        #debug-console {
            position: fixed;
            left: 10px;
            right: 10px;
            bottom: 10px;
            max-height: 220px;
            overflow: auto;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 8px;
            font-family: Consolas, monospace;
            font-size: 11px;
            line-height: 1.35;
            display: none;
            z-index: 20;
        }

        #debug-console.visible {
            display: block;
        }

        .log-info {
            color: #66d5ff;
        }

        .log-success {
            color: #88ffb1;
        }

        .log-error {
            color: #ff7f7f;
        }
    </style>
</head>
<body>
    <button id="debug-toggle" class="debug-toggle">Debug</button>
    <div id="debug-console"></div>

    <div class="app" id="app-root">
        <header>
            <div class="title">Experimental_Osm</div>
            <div class="header-actions">
                <button id="bypass" class="bypass-btn active">Active</button>
                <button id="low-mute" class="band-mute-btn">Mute Low</button>
                <button id="high-mute" class="band-mute-btn">Mute High</button>
                <button id="exp-toggle">Experimental</button>
            </div>
        </header>

        <main>
            <div class="core-wrap">
                <div class="knob-track">
                    <div class="glow-ring" id="glow-ring"></div>
                    <div class="knob-body locked" id="intensity-knob">
                        <div class="knob-indicator" id="knob-indicator"></div>
                        <div class="knob-value" id="intensity-value">LOCK</div>
                        <div class="knob-lock">Core Locked</div>
                    </div>
                </div>
            </div>

            <aside id="exp-menu" class="exp-menu">
                <div class="exp-header">
                    <div class="exp-title">Experimental Ground</div>
                    <div id="mode-tag" class="mode-tag">Core Macro</div>
                </div>
                <div class="exp-header">
                    <button id="use-core-btn" disabled>Core Macro Disabled</button>
                    <button id="exp-close-btn">Close</button>
                </div>

                <div class="exp-body">
                    <section class="group">
                        <h3 class="group-title">Global</h3>
                        <div class="param">
                            <label for="exp_crossover_hz">Low/High Split (Hz)</label>
                            <input type="range" id="exp_crossover_hz" min="80" max="600" step="1" value="220">
                            <div class="param-value" id="exp_crossover_hz_value">220</div>
                        </div>
                    </section>

                    <section class="group">
                        <h3 class="group-title">Low Band</h3>
                        <div class="param">
                            <label for="exp_low_attack_boost_db">Attack Boost (dB)</label>
                            <input type="range" id="exp_low_attack_boost_db" min="0" max="12" step="0.1" value="5.5">
                            <div class="param-value" id="exp_low_attack_boost_db_value">5.5</div>
                        </div>
                        <div class="param">
                            <label for="exp_low_attack_time_ms">Attack Time (ms)</label>
                            <input type="range" id="exp_low_attack_time_ms" min="2" max="40" step="0.1" value="14">
                            <div class="param-value" id="exp_low_attack_time_ms_value">14.0</div>
                        </div>
                        <div class="param">
                            <label for="exp_low_post_comp_db">Post Comp (dB)</label>
                            <input type="range" id="exp_low_post_comp_db" min="0" max="12" step="0.1" value="3.2">
                            <div class="param-value" id="exp_low_post_comp_db_value">3.2</div>
                        </div>
                        <div class="param">
                            <label for="exp_low_comp_time_ms">Compression Time (ms)</label>
                            <input type="range" id="exp_low_comp_time_ms" min="5" max="120" step="0.1" value="24">
                            <div class="param-value" id="exp_low_comp_time_ms_value">24.0</div>
                        </div>
                        <div class="param">
                            <label for="exp_low_body_lift_db">Body Lift (dB)</label>
                            <input type="range" id="exp_low_body_lift_db" min="-3" max="12" step="0.1" value="3.3">
                            <div class="param-value" id="exp_low_body_lift_db_value">3.3</div>
                        </div>
                        <div class="param">
                            <label for="exp_low_sat_mix">Saturation Mix</label>
                            <input type="range" id="exp_low_sat_mix" min="0" max="1" step="0.01" value="0.45">
                            <div class="param-value" id="exp_low_sat_mix_value">0.45</div>
                        </div>
                        <div class="param">
                            <label for="exp_low_sat_drive">Saturation Drive</label>
                            <input type="range" id="exp_low_sat_drive" min="1" max="3" step="0.01" value="1.8">
                            <div class="param-value" id="exp_low_sat_drive_value">1.80</div>
                        </div>
                    </section>

                    <section class="group">
                        <h3 class="group-title">High Band</h3>
                        <div class="param">
                            <label for="exp_high_attack_boost_db">Attack Boost (dB)</label>
                            <input type="range" id="exp_high_attack_boost_db" min="0" max="16" step="0.1" value="7.8">
                            <div class="param-value" id="exp_high_attack_boost_db_value">7.8</div>
                        </div>
                        <div class="param">
                            <label for="exp_high_attack_time_ms">Attack Time (ms)</label>
                            <input type="range" id="exp_high_attack_time_ms" min="2" max="40" step="0.1" value="6">
                            <div class="param-value" id="exp_high_attack_time_ms_value">6.0</div>
                        </div>
                        <div class="param">
                            <label for="exp_high_post_comp_db">Post Comp (dB)</label>
                            <input type="range" id="exp_high_post_comp_db" min="0" max="12" step="0.1" value="3.8">
                            <div class="param-value" id="exp_high_post_comp_db_value">3.8</div>
                        </div>
                        <div class="param">
                            <label for="exp_high_comp_time_ms">Compression Time (ms)</label>
                            <input type="range" id="exp_high_comp_time_ms" min="5" max="120" step="0.1" value="14">
                            <div class="param-value" id="exp_high_comp_time_ms_value">14.0</div>
                        </div>
                        <div class="param">
                            <label for="exp_high_drive_db">Drive (dB)</label>
                            <input type="range" id="exp_high_drive_db" min="0" max="24" step="0.1" value="10">
                            <div class="param-value" id="exp_high_drive_db_value">10.0</div>
                        </div>
                        <div class="param">
                            <label for="exp_high_sat_mix">Saturation Mix</label>
                            <input type="range" id="exp_high_sat_mix" min="0" max="1" step="0.01" value="0.6">
                            <div class="param-value" id="exp_high_sat_mix_value">0.60</div>
                        </div>
                        <div class="param">
                            <label for="exp_high_sat_drive">Saturation Drive</label>
                            <input type="range" id="exp_high_sat_drive" min="1" max="3" step="0.01" value="2.25">
                            <div class="param-value" id="exp_high_sat_drive_value">2.25</div>
                        </div>
                        <div class="param">
                            <label for="exp_high_trim_db">Band Trim (dB)</label>
                            <input type="range" id="exp_high_trim_db" min="-24" max="0" step="0.1" value="-2.2">
                            <div class="param-value" id="exp_high_trim_db_value">-2.2</div>
                        </div>
                    </section>

                    <section class="group">
                        <h3 class="group-title">Output Limiter</h3>
                        <div class="param">
                            <label for="exp_limiter_threshold_db">Threshold (dB)</label>
                            <input type="range" id="exp_limiter_threshold_db" min="-6" max="0" step="0.1" value="-0.5">
                            <div class="param-value" id="exp_limiter_threshold_db_value">-0.5</div>
                        </div>
                        <div class="param">
                            <label for="exp_limiter_release_ms">Release (ms)</label>
                            <input type="range" id="exp_limiter_release_ms" min="10" max="300" step="0.1" value="80">
                            <div class="param-value" id="exp_limiter_release_ms_value">80.0</div>
                        </div>
                    </section>
                </div>
            </aside>
        </main>

        <footer>
            <div class="out-row">
                <div>Output</div>
                <input type="range" id="output_gain" min="-12" max="12" step="0.1" value="0">
                <div id="output-value-display">0.0 dB</div>
            </div>
        </footer>
    </div>
</body>
</html>
